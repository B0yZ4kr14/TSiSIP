<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" aria-label="TSiSIP Logo Monochrome">
  <defs>
    <filter id="cm-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cm-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1A3A5C" flood-opacity="0.25"/>
    </filter>
    <filter id="cm-glass">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <circle cx="24" cy="24" r="20" fill="#1A3A5C" opacity="0.1" filter="url(#cm-glow)"/>

  <!-- Shield -->
  <path d="M24 2 C35 2, 42 10, 42 21 C42 33, 34 40, 24 44 C14 40, 6 33, 6 21 C6 10, 13 2, 24 2 Z"
        fill="#1A3A5C"
        stroke="#1A3A5C" stroke-width="0.5" stroke-opacity="0.35"
        filter="url(#cm-shadow)"/>

  <!-- Central proxy node -->
  <circle cx="24" cy="21" r="5" fill="#1A3A5C" opacity="0.7"/>
  <!-- Satellite nodes -->
  <circle cx="24" cy="10" r="2.5" fill="#1A3A5C" opacity="0.55"/>
  <circle cx="15" cy="31" r="2.5" fill="#1A3A5C" opacity="0.55"/>
  <circle cx="33" cy="31" r="2.5" fill="#1A3A5C" opacity="0.55"/>

  <!-- Connection traces -->
  <line x1="24" y1="21" x2="24" y2="12.5" stroke="#1A3A5C" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="16.5" y2="29.5" stroke="#1A3A5C" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="31.5" y2="29.5" stroke="#1A3A5C" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <!-- Mesh lines -->
  <line x1="24" y1="12.5" x2="16.5" y2="29.5" stroke="#1A3A5C" stroke-width="0.8" opacity="0.22" stroke-linecap="round"/>
  <line x1="24" y1="12.5" x2="31.5" y2="29.5" stroke="#1A3A5C" stroke-width="0.8" opacity="0.22" stroke-linecap="round"/>
  <line x1="16.5" y1="29.5" x2="31.5" y2="29.5" stroke="#1A3A5C" stroke-width="0.8" opacity="0.22" stroke-linecap="round"/>

  <!-- Signal arc -->
  <path d="M43 15 Q48 24, 43 33" stroke="#1A3A5C" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Glass highlight -->
  <path d="M24 2 C35 2, 42 10, 42 21 C42 23, 40 24, 38 23 C33 18, 29 16, 24 16 C19 16, 15 18, 10 23 C8 24, 6 23, 6 21 C6 10, 13 2, 24 2 Z"
        fill="#FFFFFF" opacity="0.12" filter="url(#cm-glass)"/>
</svg>
