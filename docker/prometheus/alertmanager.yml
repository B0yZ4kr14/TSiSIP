global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        alertname: TSiSIPAnomaly
        severity: critical
      receiver: 'critical-webhook'
      continue: true
    - match:
        alertname: TSiSIPAnomaly
        severity: high
      receiver: 'default'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://ocp:80/api/v1/alerts/webhook'
        send_resolved: true
  - name: 'critical-webhook'
    webhook_configs:
      - url: 'http://ocp:80/api/v1/alerts/webhook-critical'
        send_resolved: true
