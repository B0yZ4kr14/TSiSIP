---
- name: TSiSIP OCP v9 Docker Deploy on TSiAPP
  hosts: tsisip_vps
  gather_facts: true
  vars:
    tsisip_app_dir: "/opt/tsisip"
    tsisip_compose_file: "docker-compose.yml"
    tsisip_image: "tsisip/ocp:latest"
    tsisip_web_port: 8080
    tsisip_internal_network: "tsisip_internal"
    min_disk_space_gb: 1

  pre_tasks:
    - name: Pre-flight — Check disk space
      ansible.builtin.shell: |
        set -o pipefail
        df -BG / | awk 'NR==2 {print $4}' | tr -d 'G'
      args:
        executable: /bin/bash
      register: disk_space
      changed_when: false

    - name: Pre-flight — Verify minimum disk space
      ansible.builtin.fail:
        msg: "Insufficient disk space: {{ disk_space.stdout }}GB available, {{ min_disk_space_gb }}GB required"
      when: disk_space.stdout | int < min_disk_space_gb

    - name: Pre-flight — Check Docker daemon
      ansible.builtin.command: docker version --format '{{.Server.Version}}'
      register: docker_version
      changed_when: false
      ignore_errors: true

    - name: Pre-flight — Verify network connectivity
      ansible.builtin.uri:
        url: "https://registry-1.docker.io/v2/"
        status_code: [200, 401]
      register: registry_check
      ignore_errors: true

    - name: Pre-flight — Report status
      ansible.builtin.debug:
        msg:
          - "Disk space: {{ disk_space.stdout }}GB available"
          - "Docker: {{ docker_version.stdout | default('not installed') }}"
          - "Registry: {{ 'reachable' if registry_check.status | default(0) in [200, 401] else 'unreachable' }}"

  tasks:
    - name: Ensure Docker is installed
      ansible.builtin.package:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
      become: true

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      become: true

    - name: Ensure tsisip user exists
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      become: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ tsisip_app_dir }}"
        state: directory
        mode: '0750'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Deploy Docker Compose stack file
      ansible.builtin.copy:
        src: "../../docker-compose.yml"
        dest: "{{ tsisip_app_dir }}/docker-compose.yml"
        mode: '0640'

    - name: Validate Docker Compose configuration
      ansible.builtin.command:
        cmd: "docker compose -f {{ tsisip_app_dir }}/docker-compose.yml config"
      become: true
      changed_when: false

    - name: Deploy OCP web assets
      ansible.builtin.copy:
        src: "../../web/"
        dest: "{{ tsisip_app_dir }}/web/"
        mode: '0755'

    - name: Deploy secrets directory
      ansible.builtin.file:
        path: "{{ tsisip_app_dir }}/secrets"
        state: directory
        mode: '0700'

    - name: Pull latest OCP image
      ansible.builtin.command:
        cmd: "docker pull {{ tsisip_image }}"
      become: true
      changed_when: true
      no_log: true

    - name: Start TSiSIP stack
      ansible.builtin.command:
        cmd: "docker compose -f {{ tsisip_app_dir }}/{{ tsisip_compose_file }} up -d"
        chdir: "{{ tsisip_app_dir }}"
      become: true
      changed_when: true

    - name: Verify OCP container health
      ansible.builtin.uri:
        url: "http://localhost:{{ tsisip_web_port }}/login.php"
        return_content: true
      register: ocp_health
      until: "'TSiSIP' in ocp_health.content"
      retries: 10
      delay: 5

    - name: Report deployment success
      ansible.builtin.debug:
        msg: "TSiSIP OCP deployed successfully. Health check passed."
