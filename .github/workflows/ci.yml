name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TSISIP_IMAGE_TAG: test

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose configs
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          docker compose -f docker-compose.prod.yml config > /dev/null
          docker compose -f docker-compose.monitoring.yml config > /dev/null
      - name: Shell script syntax check
        run: |
          find scripts/ -name '*.sh' -exec bash -n {} \;
          find deploy/scripts/ -name '*.sh' -exec bash -n {} \;
      - name: PHP syntax check
        run: |
          find web/ -name '*.php' -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true
      - name: Run lint script
        run: bash scripts/lint.sh

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify secrets audit
        run: bash scripts/verify-secrets-audit.sh
      - name: Verify port policy
        run: bash scripts/verify-port-policy.sh
      - name: Verify TLS chain
        run: bash scripts/verify-tls-chain.sh

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
      - name: Start services
        run: docker compose up -d
      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsSL http://localhost/health.php >/dev/null 2>&1; then
              echo "Services ready"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to become healthy"
          docker compose logs --tail=50
          exit 1
      - name: Run integration tests
        run: make test
      - name: Backup verification
        run: |
          bash scripts/backup-db.sh
          LATEST=$(ls -t backups/tsisip_db_*.sql.gz | head -1)
          bash scripts/verify-backup.sh --backup "$LATEST"
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            backups/*.meta.json
            reports/*.md
