---
# TSiSIP Docker-First Deploy on TSiAPP
# RULE: All TSiSIP services run as Docker containers. No bare-metal installation.
- name: TSiSIP Stack Deploy on TSiAPP VPS
  hosts: tsisip_vps
  gather_facts: true
  vars:
    tsisip_app_dir: "/opt/tsisip"
    tsisip_compose_file: "docker-compose.prod.yml"
    tsisip_web_port: 8084
    min_disk_space_gb: 5

  pre_tasks:
    - name: Pre-flight — Check disk space
      ansible.builtin.shell: |
        set -o pipefail
        df -BG / | awk 'NR==2 {print $4}' | tr -d 'G'
      args:
        executable: /bin/bash
      register: disk_space
      changed_when: false

    - name: Pre-flight — Verify minimum disk space
      ansible.builtin.fail:
        msg: "Insufficient disk space: {{ disk_space.stdout }}GB available, {{ min_disk_space_gb }}GB required"
      when: disk_space.stdout | int < min_disk_space_gb

    - name: Pre-flight — Check Docker daemon
      ansible.builtin.command: "docker version --format '{% raw %}{{.Server.Version}}{% endraw %}'"
      register: docker_version
      changed_when: false
      ignore_errors: true

    - name: Pre-flight — Verify Docker registry reachability
      ansible.builtin.uri:
        url: "https://registry-1.docker.io/v2/"
        status_code: [200, 401]
      register: registry_check
      ignore_errors: true

    - name: Pre-flight — Report status
      ansible.builtin.debug:
        msg:
          - "Disk space: {{ disk_space.stdout }}GB available"
          - "Docker: {{ docker_version.stdout | default('not installed') }}"
          - "Registry: {{ 'reachable' if registry_check.status | default(0) in [200, 401] else 'unreachable' }}"

  tasks:
    - name: Check if Docker is already installed
      ansible.builtin.command: docker --version
      register: docker_installed
      changed_when: false
      ignore_errors: true

    - name: Ensure Docker engine is installed
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true
        cache_valid_time: 3600
      become: true
      when: docker_installed.rc != 0

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      become: true

    - name: Ensure deploy user is in docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      become: true

    - name: Create TSiSIP application directory
      ansible.builtin.file:
        path: "{{ tsisip_app_dir }}"
        state: directory
        mode: '0750'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Deploy production Docker Compose file
      ansible.builtin.copy:
        src: "../../docker-compose.prod.yml"
        dest: "{{ tsisip_app_dir }}/docker-compose.prod.yml"
        mode: '0640'

    - name: Deploy environment template
      ansible.builtin.template:
        src: "../../.env.example"
        dest: "{{ tsisip_app_dir }}/.env"
        mode: '0600'
      ignore_errors: true

    - name: Deploy secrets directory
      ansible.builtin.file:
        path: "{{ tsisip_app_dir }}/secrets"
        state: directory
        mode: '0700'

    - name: Validate Docker Compose configuration
      ansible.builtin.command:
        cmd: "docker compose -f {{ tsisip_app_dir }}/{{ tsisip_compose_file }} config"
      become: true
      changed_when: false

    - name: Login to GHCR on target host
      ansible.builtin.shell: |
        set -o pipefail
        echo "{{ lookup('env', 'GITHUB_TOKEN') }}" | docker login ghcr.io -u B0yZ4kr14 --password-stdin
      become: true
      changed_when: true
      no_log: true
      ignore_errors: true

    - name: Pull all TSiSIP images (Docker-image-first)
      ansible.builtin.command:
        cmd: "docker compose -f {{ tsisip_app_dir }}/{{ tsisip_compose_file }} pull"
      become: true
      changed_when: true
      register: pull_result
      retries: 3
      delay: 10
      until: pull_result.rc == 0

    - name: Verify all images use trusted namespace
      ansible.builtin.shell: |
        docker compose -f {{ tsisip_app_dir }}/{{ tsisip_compose_file }} config | \
        grep -E '^\s+image:' | grep -v 'tsisip/' | grep -v 'prom/' || true
      register: untrusted_images
      changed_when: false

    - name: Fail if untrusted images detected
      ansible.builtin.fail:
        msg: "Untrusted images found: {{ untrusted_images.stdout }}"
      when: untrusted_images.stdout | length > 0

    - name: Start TSiSIP stack
      ansible.builtin.command:
        cmd: "docker compose -f {{ tsisip_app_dir }}/{{ tsisip_compose_file }} up -d"
        chdir: "{{ tsisip_app_dir }}"
      become: true
      changed_when: true

    - name: Wait for OCP container to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ tsisip_web_port }}/login.php"
        return_content: true
        status_code: 200
      register: ocp_health
      until: "'TSiSIP' in ocp_health.content"
      retries: 12
      delay: 5

    - name: Verify OpenSIPS container is running
      ansible.builtin.command:
        cmd: "docker ps --filter name=opensips --filter status=running --format '{% raw %}{{.Names}}{% endraw %}'"
      register: opensips_container
      changed_when: false

    - name: Report deployment success
      ansible.builtin.debug:
        msg:
          - "TSiSIP stack deployed successfully on {{ inventory_hostname }}"
          - "OCP health check: PASSED"
          - "OpenSIPS container: {{ opensips_container.stdout | default('not found') }}"
