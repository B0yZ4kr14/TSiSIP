hooks:
  before_specify:
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before specification
    condition: null
  - extension: brownkit
    command: speckit.brownkit.enrich
    enabled: true
    optional: true
    prompt: Run BrownKit enrich to surface relevant capabilities and spec seeds for
      this feature?
    description: Injects capability context from existing evidence into the new specification.
    condition: null
  - extension: branch-convention
    command: speckit.branch-convention.validate
    enabled: true
    optional: true
    prompt: Validate branch naming convention before creating new feature?
    description: Check naming convention compliance before /specify creates a new
      branch
    condition: null
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  - extension: mde
    command: speckit.mde.sync
    enabled: true
    optional: false
    prompt: Execute speckit.mde.sync?
    description: Sync mde preset wiring before spec creation
    condition: null
  - extension: tinyspec
    command: speckit.tinyspec.classify
    enabled: true
    optional: true
    prompt: Check if this task is small enough for the lightweight tinyspec workflow?
    description: Auto-classify task complexity before starting the full SDD workflow
    condition: null
  - extension: workiq
    command: speckit.workiq.context
    enabled: true
    optional: true
    prompt: 'Before starting the specification, consider whether M365 organizational
      context would be

      helpful. If the user has Work IQ configured, suggest running `/speckit.workiq.context`
      to

      gather relevant emails, meetings, documents, and Teams messages about the topic.

      '
    description: Optionally gather M365 context before writing a spec
    condition: null
  after_specify:
  - extension: spec-validate
    command: speckit.spec-validate.validate
    enabled: true
    optional: true
    prompt: Spec generated. Run comprehension validation now?
    description: Run spec validation after specification is generated
    condition: null
  - extension: speckit-utils
    command: speckit.speckit-utils.doctor
    enabled: true
    optional: true
    prompt: Run project health check?
    description: Validate project health after specification generation
    condition: null
  - extension: fx-to-dotnet
    command: speckit.fx-to-dotnet.specify-hook
    enabled: true
    optional: false
    prompt: Execute speckit.fx-to-dotnet.specify-hook?
    description: Augment specification with .NET migration context
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: true
    prompt: Check artifact sync status after specification?
    description: Show sync status after spec generation
    condition: null
  - extension: scope
    command: speckit.scope.estimate
    enabled: true
    optional: true
    prompt: Estimate effort for this spec?
    description: Auto-generate effort estimate after spec is written
    condition: null
  - extension: squad
    command: speckit.squad.generate
    enabled: true
    optional: true
    prompt: Spec updated — regenerate Squad agent definitions?
    description: Keeps Squad agents aligned as the spec evolves
    condition: null
  - extension: token-analyzer
    command: speckit.token-analyzer.baseline
    enabled: true
    optional: true
    prompt: Capture token metrics from specification?
    description: Capture token metrics after specification generation
    condition: null
  - extension: wireframe
    command: speckit.wireframe.generate
    enabled: true
    optional: true
    prompt: Generate wireframes for this feature now?
    description: Offer wireframe generation after spec creation
    condition: null
  - extension: workiq
    command: speckit.workiq.enrich
    enabled: true
    optional: true
    prompt: 'The specification draft is complete. Suggest running `/speckit.workiq.enrich`
      to check

      for organizational knowledge that could strengthen the spec — undocumented decisions,

      stakeholder input, or constraints discussed in emails, meetings, or Teams.

      '
    description: Suggest enriching the spec with M365 data after initial draft
    condition: null
  - extension: worktree
    command: speckit.worktree.create
    enabled: true
    optional: true
    prompt: Create an isolated worktree for this new feature?
    description: Auto-spawn a worktree after a new feature is specified
    condition: null
  - extension: worktrees
    command: speckit.worktrees.create
    enabled: true
    optional: false
    prompt: Execute speckit.worktrees.create?
    description: Auto-spawn a worktree after a new feature is specified
    condition: null
  before_plan:
