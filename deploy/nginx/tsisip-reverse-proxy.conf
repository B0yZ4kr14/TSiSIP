# TSiSIP Reverse Proxy Configuration
# Exposes OCP v9 securely via https://tsiapp.io/TSiSIP
# Requires: SSL certificates for tsiapp.io

# Rate Limiting Zone
limit_req_zone $binary_remote_addr zone=tsisip_web:10m rate=30r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=tsisip_conn:10m;

upstream tsisip_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name tsiapp.io;

    # SSL Configuration
    ssl_certificate     /etc/ssl/certs/tsiapp.io.crt;
    ssl_certificate_key /etc/ssl/private/tsiapp.io.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security Headers
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Logging
    access_log /var/log/nginx/tsisip-access.log combined;
    error_log  /var/log/nginx/tsisip-error.log warn;

    # TSiSIP OCP v9 — served from Docker container on localhost:8080
    location /TSiSIP/ {
        limit_req zone=tsisip_web burst=10 nodelay;
        limit_conn tsisip_conn 10;

        proxy_pass         http://tsisip_backend/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # WebSocket support (if needed for future real-time features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint for reverse proxy monitoring
    location /TSiSIP/health {
        proxy_pass         http://tsisip_backend/login.php;
        proxy_http_version 1.1;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Nginx status (restricted to local)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # Deny access to hidden files and secrets
    location ~ /\. {
        deny all;
        return 404;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
        internal;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name tsiapp.io;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}
