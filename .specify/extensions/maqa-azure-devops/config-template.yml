# MAQA Azure DevOps Configuration
# Generated by: /speckit.maqa-azure-devops.setup
#
# Environment variable required:
#   AZURE_DEVOPS_TOKEN — Personal Access Token with Work Items read/write scope
#                        dev.azure.com → User Settings → Personal access tokens

organization: ""    # e.g. my-company
project: ""         # e.g. MyProject
team: ""            # e.g. MyProject Team

# Board column names (mapped to MAQA slots)
todo_column: "To Do"
in_progress_column: "In Progress"
in_review_column: "In Review"
done_column: "Done"

# Work item types
story_type: "User Story"   # or "Feature", "Issue", depending on process template
task_type: "Task"

# Area path (optional, leave empty to use project root)
area_path: ""
# Iteration path (optional, leave empty for backlog)
iteration_path: ""
