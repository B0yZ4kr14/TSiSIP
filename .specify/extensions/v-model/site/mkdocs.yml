site_name: V-Model Extension Pack for Spec Kit
site_url: https://leocamello.github.io/spec-kit-v-model/
site_description: >-
  Enforce V-Model traceability at AI speed. Every requirement paired with its test —
  deterministically verified, audit-ready, and stored in Git.
site_author: Leonardo Camello
repo_url: https://github.com/leocamello/spec-kit-v-model
repo_name: leocamello/spec-kit-v-model
edit_uri: edit/main/site/docs/

copyright: Copyright &copy; 2025 Leonardo Camello — MIT License

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{slug}"
      categories: true
      categories_allowed:
        - Spec-Driven Development
        - Regulated Industries
        - V-Model
        - Compliance
        - Tutorials

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/leocamello/spec-kit-v-model
  generator: false

nav:
  - Home: index.md
  - About: about.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - First Project: getting-started/first-project.md
  - Guides:
      - Concepts: guide/concepts.md
      - "Level 1: Requirements ↔ Acceptance": guide/requirements-acceptance.md
      - "Level 2: System Design ↔ Testing": guide/system-design-testing.md
      - "Level 3: Architecture ↔ Integration": guide/architecture-integration.md
      - "Level 4: Module Design ↔ Unit": guide/module-unit.md
      - Hazard Analysis: guide/hazard-analysis.md
      - Impact Analysis: guide/impact-analysis.md
      - Domain Overlays: guide/domain-overlays.md
      - ID Lifecycle: guide/id-lifecycle.md
      - Standards Enrichment: guide/standards-enrichment.md
      - Brownfield Evolution: guide/brownfield-evolution.md
      - Peer Review: guide/peer-review.md
      - Test Results: guide/test-results.md
      - Audit Report: guide/audit-report.md
      - CI Integration: guide/ci-integration.md
      - When to Use: guide/when-to-use.md
  - Compliance:
      - What Auditors Expect: compliance/index.md
      - IEC 62304 — Medical Devices: compliance/iec-62304.md
      - ISO 26262 — Automotive: compliance/iso-26262.md
      - DO-178C — Aerospace: compliance/do-178c.md
  - Tutorials:
      - "Medical Device (IEC 62304)": tutorials/medical-device.md
      - "Automotive ADAS (ISO 26262)": tutorials/automotive-adas.md
      - "Impact & Change Management": tutorials/impact-and-change.md
  - Reference:
      - Commands: reference/commands.md
      - ID Schema: reference/id-schema.md
      - Scripts: reference/scripts.md
      - Templates: reference/templates.md
      - Configuration: reference/configuration.md
  - Community:
      - Contributing: community/contributing.md
      - Changelog: community/changelog.md
      - Roadmap: community/roadmap.md
      - Security: community/security.md
      - Code of Conduct: community/code-of-conduct.md
  - Blog:
      - blog/index.md
