name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker compose build
      - name: Start services
        run: docker compose up -d
      - name: Wait for services
        run: sleep 10
      - name: Health check
        run: curl -f http://localhost/health.php
      - name: Run tests
        run: make test
