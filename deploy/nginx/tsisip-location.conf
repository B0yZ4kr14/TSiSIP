# TSiSIP — Location Block para integração no Nginx existente da TSiAPP
# Copiar este conteúdo DENTRO do server block de tsiapp.io em
# /etc/nginx/sites-available/tsiapp-https (ou equivalente)
#
# Requer: limit_req_zone e limit_conn_zone no http{} block (ver tsisip-reverse-proxy.conf)

location /TSiSIP/ {
    limit_req zone=tsisip_web burst=10 nodelay;
    limit_conn tsisip_conn 10;

    proxy_pass         http://127.0.0.1:8084/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location /TSiSIP/health {
    proxy_pass         http://127.0.0.1:8084/login.php;
    proxy_http_version 1.1;
    access_log off;
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 100.64.0.0/10;
    deny all;
}
