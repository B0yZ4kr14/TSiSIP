groups:
  - name: tsisip-opensips
    interval: 15s
    rules:
      # Dispatcher target degradation
      - alert: OpenSIPSDispatcherDegradation
        expr: opensips_dispatcher_target_response_ms > 500
        for: 2m
        labels:
          severity: critical
          service: opensips
        annotations:
          summary: "OpenSIPS dispatcher target {{ $labels.target }} response time high"
          description: "Dispatcher target {{ $labels.target }} response time is {{ $value }}ms for more than 2 minutes"
          runbook_url: "https://docs.tsiapp.io/runbooks/opensips-dispatcher-degradation"

      # Authentication spike
      - alert: OpenSIPSAuthSpike
        expr: rate(opensips_auth_failures_total[1m]) > 10
        for: 2m
        labels:
          severity: warning
          service: opensips
        annotations:
          summary: "High authentication failure rate"
          description: "Authentication failures are {{ $value }}/min for more than 2 minutes"
          runbook_url: "https://docs.tsiapp.io/runbooks/opensips-auth-spike"

  - name: tsisip-rtpengine
    interval: 30s
    rules:
      # RTPengine high port utilization
      - alert: RTPengineHighUtilization
        expr: (rtpengine_ports_used / rtpengine_ports_total) > 0.8
        for: 5m
        labels:
          severity: warning
          service: rtpengine
        annotations:
          summary: "RTPengine port utilization above 80%"
          description: "RTPengine port utilization is {{ $value | humanizePercentage }} for more than 5 minutes"
          runbook_url: "https://docs.tsiapp.io/runbooks/rtpengine-high-utilization"

  - name: tsisip-postgres
    interval: 30s
    rules:
      # PostgreSQL slow queries
      - alert: PostgreSQLSlowQueries
        expr: pg_stat_statements_mean_time > 100
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL query latency high"
          description: "Average query time is {{ $value }}ms for more than 5 minutes"
          runbook_url: "https://docs.tsiapp.io/runbooks/postgresql-slow-queries"

  - name: tsisip-infrastructure
    interval: 15s
    rules:
      # OpenSIPS exporter / MI HTTP unavailable
      - alert: OpenSIPSExporterDown
        expr: up{job="opensips"} == 0
        for: 2m
        labels:
          severity: critical
          service: opensips
        annotations:
          summary: "OpenSIPS exporter is down"
          description: "Prometheus cannot scrape the OpenSIPS exporter for more than 2 minutes. MI HTTP may be unavailable."
          runbook_url: "https://docs.tsiapp.io/runbooks/opensips-exporter-down"

      # Host memory critically low (OOM risk)
      - alert: HostMemoryCritical
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.05
        for: 2m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Host memory critically low (< 5%)"
          description: "Available memory on {{ $labels.instance }} is {{ $value | humanizePercentage }}. OOM kills imminent."
          runbook_url: "https://docs.tsiapp.io/runbooks/host-memory-critical"

      # Container memory high (warning)
      - alert: ContainerMemoryHigh
        expr: (container_memory_working_set_bytes / container_spec_memory_limit_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Container {{ $labels.name }} memory usage above 85%"
          description: "Container {{ $labels.name }} on {{ $labels.instance }} is using {{ $value | humanizePercentage }} of its limit"
          runbook_url: "https://docs.tsiapp.io/runbooks/container-memory-high"

      # Container memory critical (OOM imminent)
      - alert: ContainerMemoryCritical
        expr: (container_memory_working_set_bytes / container_spec_memory_limit_bytes) > 0.95
        for: 2m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Container {{ $labels.name }} memory usage above 95%"
          description: "Container {{ $labels.name }} on {{ $labels.instance }} is using {{ $value | humanizePercentage }} of its limit. OOM kill imminent."
          runbook_url: "https://docs.tsiapp.io/runbooks/container-memory-critical"

      # Prometheus disk full
      - alert: PrometheusDiskFull
        expr: (prometheus_tsdb_storage_blocks_bytes / prometheus_tsdb_retention_limit_bytes) > 0.85
        for: 5m
        labels:
          severity: critical
          service: prometheus
        annotations:
          summary: "Prometheus disk usage above 85%"
          description: "Prometheus TSDB is {{ $value | humanizePercentage }} full"
          runbook_url: "https://docs.tsiapp.io/runbooks/prometheus-disk-full"

  - name: tsisip-tls
    interval: 60s
    rules:
      # T3.2: TLS certificate expiry alert (critical if < 30 days)
      - alert: OpenSIPSTLSCertificateExpiringSoon
        expr: opensips_tls_certificate_expiry_timestamp - time() < 30 * 24 * 3600
        for: 5m
        labels:
          severity: critical
          service: opensips
        annotations:
          summary: "OpenSIPS TLS certificate expires in less than 30 days"
          description: "TLS certificate for OpenSIPS expires in {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.tsiapp.io/runbooks/opensips-tls-cert-expiry"

  - name: tsisip-certificates
    interval: 60s
    rules:
      - alert: CertExpiry30d
        expr: certbot_days_until_expiry < 30
        for: 5m
        labels:
          severity: warning
          service: certbot
        annotations:
          summary: "TLS certificate expires in less than 30 days"
          description: "Certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.tsiapp.io/runbooks/certbot-cert-expiry"

      - alert: CertExpiry14d
        expr: certbot_days_until_expiry < 14
        for: 5m
        labels:
          severity: warning
          service: certbot
        annotations:
          summary: "TLS certificate expires in less than 14 days"
          description: "Certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.tsiapp.io/runbooks/certbot-cert-expiry"

      - alert: CertExpiry7d
        expr: certbot_days_until_expiry < 7
        for: 5m
        labels:
          severity: critical
          service: certbot
        annotations:
          summary: "TLS certificate expires in less than 7 days"
          description: "Certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.tsiapp.io/runbooks/certbot-cert-expiry"

      - alert: CertExpiry1d
        expr: certbot_days_until_expiry < 1
        for: 5m
        labels:
          severity: critical
          service: certbot
        annotations:
          summary: "TLS certificate expires in less than 1 day"
          description: "Certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.tsiapp.io/runbooks/certbot-cert-expiry"

      - alert: CertExpired
        expr: certbot_days_until_expiry <= 0
        for: 1m
        labels:
          severity: critical
          service: certbot
        annotations:
          summary: "TLS certificate has expired"
          description: "Certificate for {{ $labels.domain }} has expired"
          runbook_url: "https://docs.tsiapp.io/runbooks/certbot-cert-expiry"

      - alert: CertRenewalFailed
        expr: increase(certbot_renewal_failure_total[1h]) > 0
        for: 5m
        labels:
          severity: critical
          service: certbot
        annotations:
          summary: "Certificate renewal failed"
          description: "Certificate renewal from {{ $labels.source }} has recorded new failures in the last hour"
          runbook_url: "https://docs.tsiapp.io/runbooks/certbot-renewal-failed"

  - name: tsisip-backup
    interval: 60s
    rules:
      # CRON-005: Backup job staleness alert (>25h without success)
      - alert: BackupJobStale
        expr: time() - backup_job_last_success{job="daily"} > 25 * 3600
        for: 5m
        labels:
          severity: critical
          service: backup
        annotations:
          summary: "Daily backup job has not succeeded in >25 hours"
          description: "Last successful backup was {{ $value | humanizeDuration }} ago"
          runbook_url: "https://docs.tsiapp.io/runbooks/backup-stale"

      - alert: PurgeJobStale
        expr: time() - backup_job_last_success{job="purge"} > 25 * 3600
        for: 5m
        labels:
          severity: warning
          service: backup
        annotations:
          summary: "Purge job has not succeeded in >25 hours"
          description: "Last successful purge was {{ $value | humanizeDuration }} ago"
          runbook_url: "https://docs.tsiapp.io/runbooks/backup-stale"

      - alert: ValidateJobStale
        expr: time() - backup_job_last_success{job="validate"} > 25 * 3600
        for: 5m
        labels:
          severity: warning
          service: backup
        annotations:
          summary: "Validation job has not succeeded in >25 hours"
          description: "Last successful validation was {{ $value | humanizeDuration }} ago"
          runbook_url: "https://docs.tsiapp.io/runbooks/backup-stale"

  - name: tsisip-backup
    interval: 60s
    rules:
      # Backup verification failure
      - alert: TSiSIPBackupVerifyFailed
        expr: tsisip_backup_verify_success == 0
        for: 5m
        labels:
          severity: critical
          service: backup
        annotations:
          summary: "TSiSIP backup verification failed"
          description: "Latest backup verification failed or no successful verification in the last 5 minutes"
          runbook_url: "https://docs.tsiapp.io/runbooks/backup-verification-failed"

      # Backup age too old
      - alert: TSiSIPBackupTooOld
        expr: time() - tsisip_backup_last_timestamp > 90000
        for: 5m
        labels:
          severity: warning
          service: backup
        annotations:
          summary: "TSiSIP backup is too old"
          description: "Latest backup is {{ $value | humanizeDuration }} old (threshold: 25h)"
          runbook_url: "https://docs.tsiapp.io/runbooks/backup-too-old"

      # Backup size anomaly (near zero)
      - alert: TSiSIPBackupSizeAnomaly
        expr: tsisip_backup_size_bytes < 1024
        for: 5m
        labels:
          severity: warning
          service: backup
        annotations:
          summary: "TSiSIP backup size anomaly"
          description: "Latest backup size is {{ $value }} bytes (possible empty dump)"
          runbook_url: "https://docs.tsiapp.io/runbooks/backup-size-anomaly"
