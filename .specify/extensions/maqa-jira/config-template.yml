# MAQA Jira Configuration
# Generated by: /speckit.maqa-jira.setup
#
# Environment variables required:
#   JIRA_BASE_URL   — e.g. https://your-org.atlassian.net
#   JIRA_EMAIL      — your Atlassian account email
#   JIRA_API_TOKEN  — API token from id.atlassian.com/manage-profile/security/api-tokens

project_key: ""     # e.g. MYAPP
board_id: ""

# Transition IDs (filled by setup — Jira uses transitions not status names)
todo_transition_id: ""
in_progress_transition_id: ""
in_review_transition_id: ""
done_transition_id: ""

# Status names (for reading current status)
todo_status: "To Do"
in_progress_status: "In Progress"
in_review_status: "In Review"
done_status: "Done"

# Issue type for features (usually "Story" or "Task")
issue_type: "Story"
# Issue type for tasks within a feature (usually "Subtask")
subtask_type: "Subtask"
