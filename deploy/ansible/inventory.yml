all:
  children:
    tsisip_vps:
      hosts:
        tsiapp:
          ansible_host: "{{ lookup('env', 'TSiAPP_HOST') }}"
          ansible_user: "{{ lookup('env', 'TSiAPP_USER') }}"
          ansible_ssh_private_key_file: "{{ lookup('env', 'TSiAPP_SSH_KEY') }}"
          ansible_python_interpreter: /usr/bin/python3
          ansible_become: true
          ansible_become_method: sudo
