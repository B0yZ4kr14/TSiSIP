all:
  children:
    tsisip_vps:
      hosts:
        tsiapp:
          ansible_host: "{{ lookup('env', 'TSiAPP_HOST') }}"
          ansible_user: "{{ lookup('env', 'TSiAPP_USER') }}"
          ansible_ssh_private_key_file: "{{ lookup('env', 'TSiAPP_SSH_KEY') }}"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          ansible_python_interpreter: /usr/bin/python3
          ansible_become: true
          ansible_become_method: sudo
          tsisip_app_dir: "/opt/tsisip"
