# TSiSIP VPS-Lite+PBX Profile
# Para VPS com ~4GB RAM.
# Serviços ativos: TSiSIP SIP edge, media relay, DB, OCP, backup e 2 PBXs internos.
# Monitoring completo (prometheus/grafana/alertmanager/exporter/anomaly-detector) fica desabilitado.
# Cada container tem mem_limit para evitar OOM do kernel.

services:
  postgres:
    image: ghcr.io/b0yz4kr14/tsisip/postgres:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: always
    networks: [db_internal, metrics_host]
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    # NOTE: ARCHIVE_* / WAL_* are not native env-based Postgres settings.
    # We enforce them via `postgres -c ...` so WAL archiving actually works.
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=test ! -f /backup/wal/%f.gz && gzip < %p > /backup/wal/%f.gz
      - -c
      - archive_timeout=300
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=2
    environment:
      POSTGRES_DB: opensips
      POSTGRES_USER: opensips
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGDATA: /var/lib/postgresql/data
    secrets: [db_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - backup_data:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensips -d opensips"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
      start_interval: 5s

  rtpengine:
    image: ghcr.io/b0yz4kr14/tsisip/rtpengine:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: always
    networks: [sip_edge, sip_internal]
    restart: on-failure
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "10000-10999:10000-10999/udp"
    environment:
      RTPENGINE_HOST: rtpengine
      RTPENGINE_NG_PORT: 22222
    command:
      - rtpengine
      - --interface=${RTPENGINE_PRIVATE_IP:-127.0.0.1}/${HOST_PUBLIC_IP:-127.0.0.1}
      - --listen-ng=${RTPENGINE_INTERNAL_IP}:22222
      - --port-min=10000
      - --port-max=10999
      - --log-stderr
      - --foreground
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  opensips:
    image: ghcr.io/b0yz4kr14/tsisip/opensips:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: always
    networks: [sip_edge, sip_internal, db_internal]
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
    environment:
      OPENSIPS_LISTEN_IP: ${OPENSIPS_LISTEN_IP:-0.0.0.0}
      HOST_PUBLIC_IP: ${HOST_PUBLIC_IP:-127.0.0.1}
      RTPENGINE_HOST: rtpengine
      DB_HOST: postgres
      DB_NAME: opensips
      DB_USER: opensips
      OPENSIPS_HOST: 127.0.0.1
    secrets:
      - db_password
      - auth_secret
      - topology_secret
      - ca.crt
      - server.crt
      - server.key
      - crl.pem
    volumes:
      - ./opensips/opensips.cfg.tpl:/etc/opensips/opensips.cfg.tpl:ro
    depends_on:
      postgres:
        condition: service_healthy
      rtpengine:
        condition: service_started
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, SETUID, SETGID]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  asterisk-pbx-1:
    image: ghcr.io/b0yz4kr14/tsisip/asterisk:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: always
    networks: [sip_internal]
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 768m
    volumes:
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./docker/asterisk/pjsip.conf:/usr/local/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/usr/local/etc/asterisk/extensions.conf:ro
    expose:
      - "5060/udp"
      - "5060/tcp"
      - "5038/tcp"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  asterisk-pbx-2:
    image: ghcr.io/b0yz4kr14/tsisip/asterisk:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: always
    networks: [sip_internal]
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 768m
    volumes:
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./docker/asterisk/pjsip.conf:/usr/local/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/usr/local/etc/asterisk/extensions.conf:ro
    expose:
      - "5060/udp"
      - "5060/tcp"
      - "5038/tcp"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  ocp:
    image: ghcr.io/b0yz4kr14/tsisip/ocp:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: always
    networks: [sip_internal, db_internal, metrics_host]
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "127.0.0.1:8084:80"
    environment:
      - DB_HOST=postgres
      - DB_NAME=opensips
      - DB_USER=opensips
      - DB_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/login.php > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backup:
    image: ghcr.io/b0yz4kr14/tsisip/backup:${TSISIP_IMAGE_TAG:?must be set}
    # For hotfix builds on the VPS, allow using a locally built image.
    # CI can still publish `:latest` to GHCR later.
    pull_policy: if_not_present
    networks: [db_internal, metrics_host]
    restart: on-failure
    mem_limit: 256m
    memswap_limit: 128m
    ports:
      - "127.0.0.1:9101:9101/tcp"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: opensips
      PGDATABASE: opensips
      PGPASSWORD_FILE: /run/secrets/db_password
      BACKUP_DIR: /backup/daily
      WAL_DIR: /backup/wal
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_SCHEDULE: "0 2 * * *"
      ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      METRICS_ADDR: 0.0.0.0
    secrets:
      - db_password
      - backup_encryption_key
    volumes:
      - backup_data:/backup
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  sip_edge:
    internal: false
  sip_internal:
    internal: true
  db_internal:
    internal: true
  metrics_host:
    internal: false

volumes:
  postgres_data:
  backup_data:

secrets:
  db_password:
    file: ./secrets/db_password
  auth_secret:
    file: ./secrets/auth_secret
  topology_secret:
    file: ./secrets/topology_secret
  backup_encryption_key:
    file: ./secrets/backup_encryption_key
  ca.crt:
    file: ./secrets/ca.crt
  server.crt:
    file: ./secrets/server.crt
  server.key:
    file: ./secrets/server.key
  crl.pem:
    file: ./secrets/crl.pem
