# TSiSIP Reverse Proxy Configuration
# Exposes OCP v9 securely via https://tsiapp.io/TSiSIP
# Requires: SSL certificates for tsiapp.io

server {
    listen 443 ssl http2;
    server_name tsiapp.io;

    # SSL Configuration
    ssl_certificate     /etc/ssl/certs/tsiapp.io.crt;
    ssl_certificate_key /etc/ssl/private/tsiapp.io.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate Limiting Zone (shared with SIP rate limiter)
    limit_req_zone $binary_remote_addr zone=tsisip_web:10m rate=30r/m;

    # TSiSIP OCP v9 — served from Docker container on localhost:8080
    location /TSiSIP/ {
        limit_req zone=tsisip_web burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # WebSocket support (if needed for future real-time features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint for reverse proxy monitoring
    location /TSiSIP/health {
        proxy_pass         http://127.0.0.1:8080/login.php;
        proxy_http_version 1.1;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # Deny access to hidden files and secrets
    location ~ /\. {
        deny all;
        return 404;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name tsiapp.io;
    return 301 https://$server_name$request_uri;
}
