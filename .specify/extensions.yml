hooks:
  before_specify:
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before specification
    condition: null
  - extension: brownkit
    command: speckit.brownkit.enrich
    enabled: true
    optional: true
    prompt: Run BrownKit enrich to surface relevant capabilities and spec seeds for
      this feature?
    description: Injects capability context from existing evidence into the new specification.
    condition: null
  after_specify:
  - extension: spec-validate
    command: speckit.spec-validate.validate
    enabled: true
    optional: true
    prompt: Spec generated. Run comprehension validation now?
    description: Run spec validation after specification is generated
    condition: null
  - extension: speckit-utils
    command: speckit.speckit-utils.doctor
    enabled: true
    optional: true
    prompt: Run project health check?
    description: Validate project health after specification generation
    condition: null
  before_plan:
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before planning
    condition: null
  - extension: memory-md
    command: speckit.memory-md.plan-with-memory
    enabled: true
    optional: true
    prompt: Would you like to synthesize project memory before planning?
    description: ''
    condition: null
  - extension: speckit-superpowers-bridge
    command: speckit.speckit-superpowers-bridge.guard
    enabled: true
    optional: false
    prompt: Execute speckit.speckit-superpowers-bridge.guard?
    description: Prevent Spec Kit contract changes while Superpowers implementation
      is executing
    condition: null
  after_plan:
  - extension: agent-governance
    command: speckit.agent-governance.refresh
    enabled: true
    optional: true
    prompt: Refresh agent governance after planning?
    description: Keeps agent context aligned with current repository governance
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.violation-detection
    enabled: true
    optional: true
    prompt: Would you like to scan the technical plan for architectural drift and
      Constitution violations?
    description: ''
    condition: null
  - extension: speckit-utils
    command: speckit.speckit-utils.validate
    enabled: true
    optional: true
    prompt: Validate spec-to-task traceability?
    description: Verify requirements map to planned tasks after planning
    condition: null
  - extension: security-review
    command: speckit.security-review.plan
    enabled: true
    optional: true
    prompt: Would you like to perform a security review on the proposed technical
      plan?
    description: ''
    condition: null
  before_tasks:
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before task generation
    condition: null
  - extension: docguard
    command: speckit.docguard.review
    enabled: true
    optional: true
    prompt: Review documentation consistency before generating tasks?
    description: ''
    condition: null
  - extension: speckit-superpowers-bridge
    command: speckit.speckit-superpowers-bridge.guard
    enabled: true
    optional: false
    prompt: Execute speckit.speckit-superpowers-bridge.guard?
    description: Prevent Spec Kit contract changes while Superpowers implementation
      is executing
    condition: null
  after_tasks:
  - extension: blueprint
    command: speckit.blueprint.generate
    enabled: true
    optional: true
    prompt: Generate blueprint from tasks?
    description: Auto-generate blueprint.md after task generation
    condition: null
  - extension: agent-governance
    command: speckit.agent-governance.refresh
    enabled: true
    optional: true
    prompt: Refresh agent governance after task generation?
    description: Keeps agent context aligned with current repository governance
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.refactor-generator
    enabled: true
    optional: true
    prompt: Would you like to generate architectural refactor tasks before implementation?
    description: ''
    condition: null
  - extension: spec-validate
    command: speckit.spec-validate.validate-tasks
    enabled: true
    optional: true
    prompt: Tasks generated. Run task validation now?
    description: Run task validation after tasks are generated
    condition: null
  - extension: security-review
    command: speckit.security-review.tasks
    enabled: true
    optional: true
    prompt: Would you like to verify that security boundaries are represented in the
      tasks?
    description: ''
    condition: null
  - extension: agent-assign
    command: speckit.agent-assign.assign
    enabled: true
    optional: true
    prompt: Assign agents to the generated tasks?
    description: Automatically assign specialized agents to tasks after generation
    condition: null
  - extension: docguard
    command: speckit.docguard.score
    enabled: true
    optional: true
    prompt: Show CDD maturity score after task generation?
    description: ''
    condition: null
  - extension: jira
    command: speckit.jira.specstoissues
    enabled: true
    optional: true
    prompt: Create Jira issues from tasks?
    description: Automatically create Jira hierarchy after task generation
    condition: null
  - extension: speckit-superpowers-bridge
    command: speckit.speckit-superpowers-bridge.handoff
    enabled: true
    optional: false
    prompt: Execute speckit.speckit-superpowers-bridge.handoff?
    description: Create the Superpowers handoff after Spec Kit task generation
    condition: null
  before_analyze:
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before analysis
    condition: null
  after_analyze: []
  after_constitution:
  - extension: agent-governance
    command: speckit.agent-governance.refresh
    enabled: true
    optional: true
    prompt: Refresh agent governance after constitution changes?
    description: Projects governance memory into the active agent context file
    condition: null
  after_implement:
  - extension: architecture-guard
    command: speckit.architecture-guard.architecture-review
    enabled: true
    optional: true
    prompt: Would you like to run a post-implementation architecture review?
    description: ''
    condition: null
  - extension: memory-md
    command: speckit.memory-md.capture-from-diff
    enabled: true
    optional: true
    prompt: Would you like to capture durable lessons from this implementation to
      project memory?
    description: ''
    condition: null
  - extension: ripple
    command: speckit.ripple.scan
    enabled: true
    optional: true
    prompt: Scan for untested side effects?
    description: Auto-scan for ripple effects after implementation
    condition: null
  - extension: security-review
    command: speckit.security-review.branch
    enabled: true
    optional: true
    prompt: Would you like to scan the new implementation for security vulnerabilities?
    description: ''
    condition: null
  - extension: brownkit
    command: speckit.brownkit.validate
    enabled: true
    optional: true
    prompt: Run BrownKit validate to check acceptance criteria against the evidence
      tree?
    description: Lightweight AC check against the capability evidence — no full packaging
      or handoff.
    condition: null
  - extension: docguard
    command: speckit.docguard.guard
    enabled: true
    optional: true
    prompt: Run DocGuard validation after implementation?
    description: Quality gate — ensures docs stay in sync with code
    condition: null
  - extension: onboard
    command: speckit.onboard.after-implement
    enabled: true
    optional: true
    prompt: Execute speckit.onboard.after-implement?
    description: ''
    condition: null
  before_implement:
  - extension: spec-validate
    command: speckit.spec-validate.gate
    enabled: true
    optional: false
    prompt: Execute speckit.spec-validate.gate?
    description: Hard gate implementation on validation and review policy
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before implementation
    condition: null
  - extension: brownkit
    command: speckit.brownkit.gate
    enabled: true
    optional: true
    prompt: Run BrownKit gate to check security threats and QA risk before implementing?
    description: Gates implementation on open STRIDE threats and QA risk score from
      prior assessment.
    condition: null
  - extension: onboard
    command: speckit.onboard.before-implement
    enabled: true
    optional: true
    prompt: Execute speckit.onboard.before-implement?
    description: ''
    condition: null
  - extension: speckit-superpowers-bridge
    command: speckit.speckit-superpowers-bridge.guard
    enabled: true
    optional: false
    prompt: Execute speckit.speckit-superpowers-bridge.guard?
    description: Block speckit.implement for features handed off to Superpowers
    condition: null
  before_clarify:
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before clarification
    condition: null
  - extension: brownkit
    command: speckit.brownkit.enrich
    enabled: true
    optional: true
    prompt: Run BrownKit enrich to surface relevant capabilities before clarifying
      this spec?
    description: Grounds spec clarification in the verified capability model.
    condition: null
  - extension: speckit-superpowers-bridge
    command: speckit.speckit-superpowers-bridge.guard
    enabled: true
    optional: false
    prompt: Execute speckit.speckit-superpowers-bridge.guard?
    description: Prevent Spec Kit contract changes while Superpowers implementation
      is executing
    condition: null
  before_checklist:
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before checklist generation
    condition: null
  after_init:
  - extension: brownfield
    command: speckit.brownfield.scan
    enabled: true
    optional: true
    prompt: Scan this existing project to customize spec-kit configuration?
    description: Auto-scan project after spec-kit init to detect tech stack and conventions
    condition: null
  before_constitution:
  - extension: brownkit
    command: speckit.brownkit.generate
    enabled: true
    optional: true
    prompt: Run BrownKit generate to prepare capability contexts first?
    description: Prepares capability-scoped AI contexts and spec seeds before constitution
      update.
    condition: null
  after_explain:
  - extension: onboard
    command: speckit.onboard.after-explain
    enabled: true
    optional: true
    prompt: Execute speckit.onboard.after-explain?
    description: ''
    condition: null
installed:
- agent-assign
- agent-governance
- architecture-guard
- blueprint
- brownfield
- brownkit
- catalog-ci
- conduct
- docguard
- jira
- memory-loader
- memory-md
- onboard
- ripple
- security-review
- spec-validate
- speckit-superpowers-bridge
- speckit-utils
settings:
  auto_execute_hooks: true
