---
- name: TSiSIP OCP v9 Docker Deploy on TSiAPP
  hosts: tsisip_vps
  gather_facts: true
  vars:
    tsisip_app_dir: "/opt/tsisip"
    tsisip_compose_file: "docker-compose.yml"
    tsisip_image: "tsisip/ocp:latest"
    tsisip_web_port: 8080
    tsisip_internal_network: "tsisip_internal"

  tasks:
    - name: Ensure Docker is installed
      ansible.builtin.package:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
      become: true

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      become: true

    - name: Ensure tsisip user exists
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      become: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ tsisip_app_dir }}"
        state: directory
        mode: '0750'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Deploy Docker Compose stack
      ansible.builtin.copy:
        src: "../../docker-compose.yml"
        dest: "{{ tsisip_app_dir }}/docker-compose.yml"
        mode: '0640'

    - name: Deploy OCP web assets
      ansible.builtin.copy:
        src: "../../web/"
        dest: "{{ tsisip_app_dir }}/web/"
        mode: '0755'

    - name: Deploy secrets directory
      ansible.builtin.file:
        path: "{{ tsisip_app_dir }}/secrets"
        state: directory
        mode: '0700'

    - name: Pull latest OCP image
      ansible.builtin.command:
        cmd: "docker pull {{ tsisip_image }}"
      become: true
      changed_when: true

    - name: Start TSiSIP stack
      ansible.builtin.command:
        cmd: "docker compose -f {{ tsisip_app_dir }}/{{ tsisip_compose_file }} up -d"
        chdir: "{{ tsisip_app_dir }}"
      become: true
      changed_when: true

    - name: Verify OCP container health
      ansible.builtin.uri:
        url: "http://localhost:{{ tsisip_web_port }}/login.php"
        return_content: true
      register: ocp_health
      until: "'TSiSIP' in ocp_health.content"
      retries: 10
      delay: 5

    - name: Report deployment success
      ansible.builtin.debug:
        msg: "TSiSIP OCP deployed successfully. Health check passed."
