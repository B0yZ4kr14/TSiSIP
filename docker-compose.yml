services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: tsisip/postgres:${TSISIP_IMAGE_TAG:?must be set}
    user: "999:999"
    networks:
    - db_internal
    restart: unless-stopped
    oom_score_adj: -500
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    environment:
      POSTGRES_DB: opensips
      POSTGRES_USER: opensips
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGDATA: /var/lib/postgresql/data
      ARCHIVE_MODE: 'on'
      ARCHIVE_COMMAND: test ! -f /backup/wal/%f && gzip < %p > /backup/wal/%f.gz
      ARCHIVE_TIMEOUT: 300
      WAL_LEVEL: replica
      MAX_WAL_SENDERS: 2
    secrets:
    - db_password
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./db/init:/docker-entrypoint-initdb.d:ro
    - backup_data:/backup
    command:
    - postgres
    - -c
    - shared_buffers=1GB
    - -c
    - effective_cache_size=3GB
    - -c
    - work_mem=8MB
    - -c
    - maintenance_work_mem=256MB
    - -c
    - max_connections=200
    - -c
    - wal_buffers=16MB
    - -c
    - checkpoint_completion_target=0.9
    - -c
    - max_wal_size=2GB
    - -c
    - min_wal_size=512MB
    - -c
    - random_page_cost=1.1
    - -c
    - effective_io_concurrency=200
    - -c
    - log_min_duration_statement=1000
    - -c
    - log_checkpoints=on
    - -c
    - log_connections=on
    - -c
    - log_disconnections=on
    - -c
    - log_lock_waits=on
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U opensips -d opensips
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
      start_interval: 5s

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0@sha256:386b12d19eab2a37d7cd8ca8b4c7491cc7a830d9581f49af6c98a393da9605e6
    networks:
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    environment:
      DATA_SOURCE_URI: postgres:5432/opensips?sslmode=prefer
      DATA_SOURCE_USER: opensips
      DATA_SOURCE_PASS_FILE: /run/secrets/db_password
    secrets:
    - db_password
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test: ["NONE"]
    depends_on:
      postgres:
        condition: service_healthy

  pgbouncer:
    build:
      context: ./docker/pgbouncer
    image: tsisip/pgbouncer:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - db_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    environment:
      POSTGRES_HOST: postgres
    secrets:
    - db_password
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  node_exporter:
    image: prom/node-exporter:v1.8.0@sha256:8a57af80a4c77ffb97749b44895248563616fcfd405b5370d5db35fe6c15e4ec
    networks:
    - monitoring
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/host/root
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    healthcheck:
      test: ["NONE"]
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/host/root:ro
    pid: host
    cap_drop:
    - ALL
    cap_add:
    - SYS_TIME
    security_opt:
    - no-new-privileges:true

  rtpengine:
    build:
      context: ./docker/rtpengine
    image: tsisip/rtpengine:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    restart: on-failure
    oom_score_adj: -500
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    ports:
    - 10000-20000:10000-20000/udp
    command:
    - --interface=${RTPENGINE_PRIVATE_IP}!${HOST_PUBLIC_IP}
    - --listen-ng=${RTPENGINE_INTERNAL_IP}:22222
    - --listen-http=${RTPENGINE_INTERNAL_IP}:2225
    - --port-min=10000
    - --port-max=20000
    - --log-stderr
    - --foreground
    - --dtls-passive
    secrets:
    - server.crt
    - server.key
    volumes:
    - tls_certs:/certs/live:ro
    - ./deploy/nginx/ssl:/nginx/ssl:ro
    cap_drop:
    - ALL
    cap_add:
    - NET_BIND_SERVICE
    - NET_ADMIN
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test:
      - CMD-SHELL
      - /usr/local/bin/healthcheck.sh
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  opensips:
    build: .
    image: tsisip/opensips:${TSISIP_IMAGE_TAG:?must be set}
    # Dev tuning: 512MB shm + 32MB pkg per child (container limit 1G)
    command: ["/usr/local/sbin/opensips", "-F", "-f", "/etc/opensips/opensips.cfg", "-m", "512", "-M", "32"]
    networks:
    - sip_edge
    - sip_internal
    - db_internal
    restart: unless-stopped
    oom_score_adj: -500
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    ports:
    - 5060:5060/udp
    - 5060:5060/tcp
    - 5061:5061/tcp
    # WebSocket ports are NOT published per canonical spec §5
    # (sip_edge network handles WS/WSS internally only)
    environment:
      OPENSIPS_LISTEN_IP: ${OPENSIPS_LISTEN_IP}
      HOST_PUBLIC_IP: ${HOST_PUBLIC_IP}
      OPENSIPS_HOST: ${OPENSIPS_HOST:-127.0.0.1}
      DB_HOST: pgbouncer
      DB_NAME: opensips
      DB_USER: opensips
      RTPENGINE_HOST: rtpengine
    secrets:
    - db_password
    - auth_secret
    - topology_secret
    - ca.crt
    - server.crt
    - server.key
    - crl.pem
    - trunk_cred_key
    volumes:
    - tls_certs:/certs/live:ro
    - opensips_state:/var/run/opensips
    depends_on:
      postgres:
        condition: service_healthy
      rtpengine:
        condition: service_started
    cap_drop:
    - ALL
    cap_add:
    - NET_BIND_SERVICE
    - SETUID
    - SETGID
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test:
      - CMD-SHELL
      - /usr/local/bin/healthcheck.sh
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s
  asterisk_pbx_1:
    build:
      context: ./docker/asterisk
    image: tsisip/asterisk:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
    - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
    - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
    cap_drop:
    - ALL
    cap_add:
    - NET_BIND_SERVICE
    security_opt:
    - no-new-privileges:true
    expose:
    - 5060/udp
    - 5060/tcp
    healthcheck:
      test:
      - CMD-SHELL
      - /usr/local/bin/healthcheck.sh
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s
  asterisk_pbx_2:
    image: tsisip/asterisk:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
    - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
    - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
    cap_drop:
    - ALL
    cap_add:
    - NET_BIND_SERVICE
    security_opt:
    - no-new-privileges:true
    expose:
    - 5060/udp
    - 5060/tcp
    healthcheck:
      test:
      - CMD-SHELL
      - /usr/local/bin/healthcheck.sh
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s
  ocp:
    build:
      context: .
      dockerfile: docker/ocp/Dockerfile
    image: tsisip/ocp:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      DB_HOST: pgbouncer
      DB_NAME: opensips
      DB_USER: opensips
      OCP_AUDIT_RETENTION_DAYS: ${OCP_AUDIT_RETENTION_DAYS:-90}
      ADMIN_API_URL: http://admin_api:8080/index.php
      OPENSIPS_MI_URL: http://opensips:8888/mi
      ANOMALY_API_KEY: ${ANOMALY_API_KEY:?must be set}
    secrets:
    - db_password
    - trunk_cred_key
    - proxy_api_secret
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop:
    - ALL
    cap_add:
    - SETUID
    - SETGID
    - DAC_OVERRIDE
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsSL http://localhost/login.php | grep -q 'TSiSIP' || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  admin_api:
    build:
      context: .
      dockerfile: docker/admin_api/Dockerfile
    image: tsisip/admin_api:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      DB_HOST: pgbouncer
      DB_NAME: opensips
      DB_USER: opensips
      SUBSCRIBER_CREATE_RATE_LIMIT: ${SUBSCRIBER_CREATE_RATE_LIMIT:-10}
      SUBSCRIBER_UPDATE_RATE_LIMIT: ${SUBSCRIBER_UPDATE_RATE_LIMIT:-30}
      SUBSCRIBER_DELETE_RATE_LIMIT: ${SUBSCRIBER_DELETE_RATE_LIMIT:-10}
    secrets:
    - db_password
    - proxy_api_secret
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop:
    - ALL
    cap_add:
    - SETUID
    - SETGID
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health.php > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    security_opt:
    - no-new-privileges:true
  prometheus:
    build:
      context: ./docker/prometheus
    image: tsisip/prometheus:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-http://localhost:5000/alerts}
      ALERTMANAGER_SMTP_HOST: ${ALERTMANAGER_SMTP_HOST:-localhost:25}
      ALERTMANAGER_SMTP_FROM: ${ALERTMANAGER_SMTP_FROM:-alerts@tsiapp.io}
    volumes:
    - prometheus_data:/prometheus
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    command:
    - --config.file=/etc/prometheus/rendered/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=30d
    - --storage.tsdb.retention.size=10GB
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    - --web.enable-lifecycle
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:9090/-/healthy | grep -q 'Prometheus'
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    networks:
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-http://localhost:5000/alerts}
    volumes:
    - ./docker/prometheus/alertmanager.yml.tpl:/etc/alertmanager/alertmanager.yml.tpl:ro
    - alertmanager_data:/alertmanager
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    - --web.external-url=http://alertmanager:9093
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:9093/-/healthy | grep -q 'OK'
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
  anomaly_detector:
    build:
      context: ./docker/anomaly_detector
    image: tsisip/anomaly_detector:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      ANOMALY_WINDOW_SECONDS: 60
      ANOMALY_Z_THRESHOLD: 3.0
      BASELINE_WINDOW_HOURS: 24
      ALERT_COOLDOWN_SECONDS: 300
      ALERTMANAGER_URL: http://alertmanager:9093/api/v1/alerts
      ENABLE_ALERTMANAGER: 'true'
      API_KEY: ${ANOMALY_API_KEY:?must be set}
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    ports:
    - 127.0.0.1:8082:8080
    depends_on:
      opensips:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsSL http://localhost:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
  grafana:
    build:
      context: ./docker/grafana
    image: tsisip/grafana:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_DEFAULT_THEME: light
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: ''
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - grafana_admin_password
    volumes:
    - grafana_data:/var/lib/grafana
    depends_on:
    - prometheus
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsSL http://localhost:3000/api/health | grep -q 'ok'
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
  opensips_exporter:
    build:
      context: ./docker/opensips_exporter
    image: tsisip/opensips_exporter:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      OPENSIPS_MI_HOST: opensips
      OPENSIPS_MI_PORT: 8888
      EXPORTER_PORT: 9442
      CACHE_TTL_SECONDS: 10
      TLS_CERT_PATH: /certs/live/server.crt
    cap_drop:
    - ALL
    volumes:
    - tls_certs:/certs/live:ro
    security_opt:
    - no-new-privileges:true
    secrets:
    - server.crt
    depends_on:
      opensips:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsSL http://localhost:9442/metrics | grep -q 'opensips'
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
  certbot:
    build:
      context: ./docker/certbot
    image: ghcr.io/b0yz4kr14/tsisip/certbot:${TSISIP_IMAGE_TAG:?must be set}
    profiles:
    - certbot
    networks:
    - sip_internal
    restart: on-failure
    environment:
      TLS_DOMAIN: ${TLS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      ACME_SERVER: ${ACME_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
      OPENSIPS_MI_URL: http://opensips:8888/mi
    volumes:
    - certbot_data:/etc/letsencrypt
    - tls_certs:/certs/live
    depends_on:
      opensips:
        condition: service_healthy
    cap_drop:
    - ALL
    cap_add:
    - SETUID
    - SETGID
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test:
      - CMD-SHELL
      - /usr/local/bin/healthcheck.sh
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
  tailscale_cert:
    build:
      context: ./docker/tailscale_cert
    image: ghcr.io/b0yz4kr14/tsisip/tailscale_cert:${TSISIP_IMAGE_TAG:?must be set}
    profiles:
    - tailscale
    networks:
    - sip_internal
    restart: on-failure
    environment:
      TS_HOSTNAME: ${TS_HOSTNAME:-tsisip}
      OPENSIPS_MI_URL: http://opensips:8888/mi
    volumes:
    - tls_certs:/certs/live
    - tailscale_state:/var/lib/tailscale
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test: ["NONE"]
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
  certbot_exporter:
    build:
      context: ./docker/certbot_exporter
    image: tsisip/certbot_exporter:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - sip_internal
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    environment:
      CERT_PATH: /certs/live/server.crt
      CERT_PATHS: /nginx/ssl/tsiapp.io.crt
      CERT_SOURCES: cloudflare-origin-ca
      CERT_DOMAINS: tsiapp.io
      STATE_DIR: /var/lib/certbot-exporter
      EXPORTER_PORT: 9101
      CERT_SOURCE: certbot
      TLS_DOMAIN: ${TLS_DOMAIN:-unknown}
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    volumes:
    - tls_certs:/certs/live:ro
    expose:
    - '9101'
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsSL http://localhost:9101/metrics | grep -q 'certbot'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  backup:
    build:
      context: ./docker/backup
    image: tsisip/backup:${TSISIP_IMAGE_TAG:?must be set}
    networks:
    - db_internal
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    environment:
      BACKUP_SCHEDULE: 0 2 * * *
      PURGE_SCHEDULE: 0 3 * * *
      VALIDATE_SCHEDULE: 0 4 * * *
      REPLICATE_SCHEDULE: 0 * * * *
      RPO_SCHEDULE: '*/5 * * * *'
      QUOTA_SCHEDULE: '*/10 * * * *'
      BACKUP_RETENTION_DAYS: 30
      WAL_RETENTION_DAYS: 37
      LGPD_RETENTION_DAYS: 30
      BACKUP_QUOTA_GB: 100
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: opensips
      PGUSER: opensips
      PGPASSWORD_FILE: /run/secrets/db_password
      OCP_AUDIT_RETENTION_DAYS: ${OCP_AUDIT_RETENTION_DAYS:-90}
      ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      METRICS_PORT: 9101
      METRICS_ADDR: 0.0.0.0
      RCLONE_S3_PROVIDER: ${RCLONE_S3_PROVIDER:-}
      RCLONE_S3_REGION: ${RCLONE_S3_REGION:-us-east-1}
      RCLONE_S3_ENDPOINT: ${RCLONE_S3_ENDPOINT:-}
      RCLONE_REMOTE_NAME: ${RCLONE_REMOTE_NAME:-remote}
      RCLONE_REMOTE_PATH: ${RCLONE_REMOTE_PATH:-tsisip-backups}
      RCLONE_BW_LIMIT: ${RCLONE_BW_LIMIT:-50M}
    cap_drop:
    - ALL
    cap_add:
    - SETUID
    - SETGID
    - CHOWN
    - DAC_OVERRIDE
    security_opt:
    - no-new-privileges:true
    secrets:
    - db_password
    - backup_encryption_key
    - rclone_s3_access_key
    - rclone_s3_secret_key
    volumes:
    - backup_data:/backup
    depends_on:
      postgres:
        condition: service_healthy
    expose:
    - '9101'
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
networks:
  sip_edge:
    driver: bridge
  sip_internal:
    driver: bridge
    internal: true
  db_internal:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
volumes:
  postgres_data: null
  backup_data: null
  prometheus_data: null
  alertmanager_data: null
  grafana_data: null
  tls_certs: null
  certbot_data: null
  tailscale_state: null
  opensips_state: null
secrets:
  db_password:
