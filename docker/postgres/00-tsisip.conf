# TSiSIP PostgreSQL Memory and Performance Tuning
# Container context: 8GB limit / 4GB reservation / 2GB shm_size

# --- Memory ---
shared_buffers = 1GB                    # ~25% of container reservation (4GB)
effective_cache_size = 3GB              # ~75% of container reservation
work_mem = 16MB                         # Conservative: 16MB * 200 conn = 3.2GB max
maintenance_work_mem = 256MB

# --- Connections ---
max_connections = 200

# --- WAL ---
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# --- Query Planner ---
random_page_cost = 1.1                  # SSD storage
effective_io_concurrency = 200

# --- Logging ---
log_min_duration_statement = 1000       # Log queries > 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# --- Locale ---
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
