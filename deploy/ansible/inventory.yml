all:
  children:
    tsisip_vps:
      hosts:
        tsiapp:
          # Canonical VPS: TSiAPP (179.190.15.116 / 100.111.74.69)
          ansible_host: "{{ lookup('env', 'TSiAPP_HOST') | default('179.190.15.116') }}"
          ansible_user: "{{ lookup('env', 'TSiAPP_USER') | default('tsi') }}"
          ansible_ssh_private_key_file: "{{ lookup('env', 'TSiAPP_SSH_KEY') | default('~/.ssh/TSiHomeLab') }}"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile={{ lookup('env', 'PROJECT_ROOT') | default('/opt/tsisip') }}/deploy/ssh/known_hosts"
          ansible_python_interpreter: /usr/bin/python3
          ansible_become: true
          ansible_become_method: sudo
          tsisip_app_dir: "/opt/tsisip"
