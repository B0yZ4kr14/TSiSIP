; TSiSIP Asterisk Dialplan
; Routes inbound calls from OpenSIPS to local test endpoints

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
; No global variables required for basic trunk

[from-opensips]
; Inbound calls from OpenSIPS edge proxy
exten => _X.,1,NoOp(Call from OpenSIPS: ${CALLERID(all)} -> ${EXTEN})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(hello)
 same => n,Hangup()

; Extension for integration test endpoint
exten => 1000,1,NoOp(Test endpoint reached)
 same => n,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()
