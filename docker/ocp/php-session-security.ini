; TSiSIP OCP Session Security Hardening
; These settings align with CANONICAL-SPEC Section 17 Security Model

session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = "Strict"

; NOTE: cookie_secure is left at default (0) because the OCP container
; receives HTTP from the nginx reverse proxy. The nginx layer must add
; the Secure flag via proxy_cookie_flags or the upstream must be accessed
; exclusively via HTTPS. Documented in OPERATOR-RUNBOOK.

session.gc_maxlifetime = 3600
session.cookie_lifetime = 0
