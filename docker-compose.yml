services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: tsisip/postgres:${TSISIP_IMAGE_TAG:-latest}
    networks: [db_internal]
    restart: unless-stopped
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    environment:
      POSTGRES_DB: opensips
      POSTGRES_USER: opensips
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGDATA: /var/lib/postgresql/data
      ARCHIVE_MODE: "on"
      ARCHIVE_COMMAND: "test ! -f /backup/wal/%f && gzip < %p > /backup/wal/%f.gz"
      ARCHIVE_TIMEOUT: 300
      WAL_LEVEL: replica
      MAX_WAL_SENDERS: 2
    secrets: [db_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - backup_data:/backup
    command:
      - postgres
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_connections=200
      - -c
      - wal_buffers=16MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=2GB
      - -c
      - min_wal_size=512MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_checkpoints=on
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_lock_waits=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensips -d opensips"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
      start_interval: 5s

  rtpengine:
    build:
      context: ./docker/rtpengine
    image: tsisip/rtpengine:${TSISIP_IMAGE_TAG:-latest}
    networks: [sip_edge, sip_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    ports:
      - "10000-20000:10000-20000/udp"
    command:
      - --interface=${RTPENGINE_PRIVATE_IP}/${HOST_PUBLIC_IP}
      - --listen-ng=${RTPENGINE_INTERNAL_IP}:22222
      - --port-min=10000
      - --port-max=20000
      - --log-stderr
      - --foreground
      # T4.1/T5.2: SRTP/DTLS configuration
      - --dtls-cert-file=/run/secrets/server.crt
      - --dtls-key-file=/run/secrets/server.key
      - --dtls-passive
      - --srtp-ciphers=AES_GCM_256:AES_256_CM_HMAC_SHA1_80
    secrets:
      - server.crt
      - server.key
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  opensips:
    build: .
    image: tsisip/opensips:${TSISIP_IMAGE_TAG:-latest}
    networks: [sip_edge, sip_internal, db_internal]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
      - "8080:8080/tcp"
      - "4443:4443/tcp"
    environment:
      OPENSIPS_LISTEN_IP: ${OPENSIPS_LISTEN_IP}
      HOST_PUBLIC_IP: ${HOST_PUBLIC_IP}
      DB_HOST: postgres
      DB_NAME: opensips
      DB_USER: opensips
      RTPENGINE_HOST: rtpengine
    secrets:
      - db_password
      - auth_secret
      - topology_secret
      - ca.crt
      - server.crt
      - server.key
      - crl.pem
    depends_on:
      postgres:
        condition: service_healthy
      rtpengine:
        condition: service_started
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, SETUID, SETGID]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

  asterisk-pbx-1:
    build:
      context: ./docker/asterisk
    image: tsisip/asterisk:${TSISIP_IMAGE_TAG:-latest}
    networks: [sip_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
    expose:
      - "5060/udp"
      - "5060/tcp"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  asterisk-pbx-2:
    image: tsisip/asterisk:${TSISIP_IMAGE_TAG:-latest}
    networks: [sip_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
    expose:
      - "5060/udp"
      - "5060/tcp"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

  ocp:
    build:
      context: .
      dockerfile: docker/ocp/Dockerfile
    image: tsisip/ocp:${TSISIP_IMAGE_TAG:-latest}
    networks: [sip_internal, db_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      DB_HOST: postgres
      DB_NAME: opensips
      DB_USER: opensips
    secrets: [db_password]
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost/login.php | grep -q 'TSiSIP' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # --- Observability Stack ---
  prometheus:
    build:
      context: ./docker/prometheus
    image: tsisip/prometheus:${TSISIP_IMAGE_TAG:-latest}
    networks: [db_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-http://localhost:5000/alerts}
      ALERTMANAGER_SMTP_HOST: ${ALERTMANAGER_SMTP_HOST:-localhost:25}
      ALERTMANAGER_SMTP_FROM: ${ALERTMANAGER_SMTP_FROM:-alerts@tsiapp.io}
    volumes:
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy | grep -q 'Prometheus'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    networks: [db_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-http://localhost:5000/alerts}
    volumes:
      - ./docker/prometheus/alertmanager.yml.tpl:/etc/alertmanager/alertmanager.yml.tpl:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://alertmanager:9093'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy | grep -q 'OK'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  anomaly-detector:
    build:
      context: ./docker/anomaly-detector
    image: tsisip/anomaly-detector:${TSISIP_IMAGE_TAG:-latest}
    networks: [sip_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      ANOMALY_WINDOW_SECONDS: 60
      ANOMALY_Z_THRESHOLD: 3.0
      BASELINE_WINDOW_HOURS: 24
      ALERT_COOLDOWN_SECONDS: 300
      ALERTMANAGER_URL: http://alertmanager:9093/api/v1/alerts
      ENABLE_ALERTMANAGER: "true"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      opensips:
        condition: service_healthy

  grafana:
    build:
      context: ./docker/grafana
    image: tsisip/grafana:${TSISIP_IMAGE_TAG:-latest}
    networks: [db_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_DEFAULT_THEME: light
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: ""
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  opensips-exporter:
    build:
      context: ./docker/opensips-exporter
    image: tsisip/opensips-exporter:${TSISIP_IMAGE_TAG:-latest}
    networks: [sip_internal, db_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      OPENSIPS_MI_HOST: opensips
      OPENSIPS_MI_PORT: 8888
      EXPORTER_PORT: 9442
      CACHE_TTL_SECONDS: 10
      TLS_CERT_PATH: /run/secrets/server.crt
    secrets:
      - server.crt
    depends_on:
      - opensips
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9442/metrics | grep -q 'opensips'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Backup Service ---
  backup:
    build:
      context: ./docker/backup
    image: tsisip/backup:${TSISIP_IMAGE_TAG:-latest}
    networks: [db_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    environment:
      BACKUP_SCHEDULE: "0 2 * * *"
      PURGE_SCHEDULE: "0 3 * * *"
      VALIDATE_SCHEDULE: "0 4 * * *"
      REPLICATE_SCHEDULE: "0 * * * *"
      RPO_SCHEDULE: "*/5 * * * *"
      QUOTA_SCHEDULE: "*/10 * * * *"
      BACKUP_RETENTION_DAYS: 30
      WAL_RETENTION_DAYS: 37
      BACKUP_QUOTA_GB: 100
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: opensips
      PGUSER: opensips
      PGPASSWORD_FILE: /run/secrets/db_password
      ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      METRICS_PORT: 9101
      METRICS_ADDR: 0.0.0.0
      RCLONE_S3_PROVIDER: ${RCLONE_S3_PROVIDER:-}
      RCLONE_S3_ACCESS_KEY: ${RCLONE_S3_ACCESS_KEY:-}
      RCLONE_S3_SECRET_KEY: ${RCLONE_S3_SECRET_KEY:-}
      RCLONE_S3_REGION: ${RCLONE_S3_REGION:-us-east-1}
      RCLONE_S3_ENDPOINT: ${RCLONE_S3_ENDPOINT:-}
      RCLONE_REMOTE_NAME: ${RCLONE_REMOTE_NAME:-remote}
      RCLONE_REMOTE_PATH: ${RCLONE_REMOTE_PATH:-tsisip-backups}
      RCLONE_BW_LIMIT: ${RCLONE_BW_LIMIT:-50M}
    secrets:
      - db_password
      - backup_encryption_key
    volumes:
      - backup_data:/backup
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "9101"

networks:
  sip_edge:
    driver: bridge
  sip_internal:
    driver: bridge
    internal: true
  db_internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  backup_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

secrets:
  db_password:
    file: ./secrets/db_password
  auth_secret:
    file: ./secrets/auth_secret
  topology_secret:
    file: ./secrets/topology_secret
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
  backup_encryption_key:
    file: ./secrets/backup_encryption_key
  ca.crt:
    file: ./secrets/ca.crt
  server.crt:
    file: ./secrets/server.crt
  server.key:
    file: ./secrets/server.key
  crl.pem:
    file: ./secrets/crl.pem
