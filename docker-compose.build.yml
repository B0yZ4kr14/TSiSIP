# Build overlay for docker-compose.prod.yml
# Used when GHCR push is unavailable and images must be built on the target VPS.
# Contexts match the CI Build Images job so COPY paths resolve correctly.
services:
  opensips:
    build:
      context: .
      dockerfile: Dockerfile
  rtpengine:
    build:
      context: ./docker/rtpengine
      dockerfile: Dockerfile
  ocp:
    build:
      context: .
      dockerfile: docker/ocp/Dockerfile
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
  asterisk:
    build:
      context: ./docker/asterisk
      dockerfile: Dockerfile
  prometheus:
    build:
      context: ./docker/prometheus
      dockerfile: Dockerfile
  grafana:
    build:
      context: ./docker/grafana
      dockerfile: Dockerfile
  opensips_exporter:
    build:
      context: ./docker/opensips_exporter
      dockerfile: Dockerfile
  anomaly_detector:
    build:
      context: ./docker/anomaly_detector
      dockerfile: Dockerfile
  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
  certbot:
    build:
      context: ./docker/certbot
      dockerfile: Dockerfile
  certbot_exporter:
    build:
      context: ./docker/certbot_exporter
      dockerfile: Dockerfile
  tailscale_cert:
    build:
      context: ./docker/tailscale_cert
      dockerfile: Dockerfile
