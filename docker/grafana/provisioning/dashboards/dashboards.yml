apiVersion: 1

providers:
  - name: 'TSiSIP Dashboards'
    orgId: 1
    folder: 'TSiSIP'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/tsisip
      foldersFromFilesStructure: false
