; TSiSIP Asterisk PJSIP Configuration
; Trunk configuration for OpenSIPS edge proxy

[global]
type=global
user_agent=TSiSIP-Asterisk
endpoint_identifier_order=ip,username,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; --- OpenSIPS Trunk (identified by internal IP) ---
[opensips]
type=endpoint
disallow=all
allow=ulaw
allow=alaw
allow=g722
context=from-opensips
direct_media=no
send_pai=yes
send_rpid=yes
trust_id_inbound=yes
aors=opensips

[opensips-aor]
type=aor
contact=sip:opensips:5060
max_contacts=1

; Identify OpenSIPS by internal Docker network IP range
[opensips-identify]
type=identify
endpoint=opensips
match=172.19.0.0/16
match=10.0.0.0/8
match=192.168.0.0/16
