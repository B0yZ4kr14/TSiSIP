# TSiSIP VPS-Lite+PBX Profile
# Para VPS com ~4GB RAM.
# Serviços ativos: TSiSIP SIP edge, media relay, DB, OCP, backup e 2 PBXs internos.
# Monitoring completo (prometheus/grafana/alertmanager/exporter/anomaly_detector) fica desabilitado.
# Cada container tem mem_limit para evitar OOM do kernel.

services:
  postgres:
    image: ghcr.io/b0yz4kr14/tsisip/postgres:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: missing
    networks: [db_internal, metrics_host]
    restart: unless-stopped
    shm_size: 1gb
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    # NOTE: ARCHIVE_* / WAL_* are not native env-based Postgres settings.
    # We enforce them via `postgres -c ...` so WAL archiving actually works.
    # VPS profile: tuned for ~2GB container limit (25% shared_buffers, proportional work_mem).
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=test ! -f /backup/wal/%f.gz && gzip < %p > /backup/wal/%f.gz
      - -c
      - archive_timeout=300
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=2
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=100
      - -c
      - wal_buffers=16MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=1GB
      - -c
      - min_wal_size=256MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_checkpoints=on
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_lock_waits=on
    environment:
      POSTGRES_DB: opensips
      POSTGRES_USER: opensips
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGDATA: /var/lib/postgresql/data
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, CHOWN, FOWNER, DAC_OVERRIDE]
    secrets: [db_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - backup_data:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensips -d opensips"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
      start_interval: 5s

  rtpengine:
    image: ghcr.io/b0yz4kr14/tsisip/rtpengine:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: missing
    networks: [sip_internal]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    ports:
      - "10000-10999:10000-10999/udp"
    environment:
      RTPENGINE_HOST: rtpengine
      RTPENGINE_NG_PORT: 22222
    command:
      - rtpengine
      - --interface=${RTPENGINE_PRIVATE_IP:-127.0.0.1}/${HOST_PUBLIC_IP:-127.0.0.1}
      - --listen-ng=${RTPENGINE_INTERNAL_IP}:22222
      - --port-min=10000
      - --port-max=10999
      - --log-stderr
      - --foreground
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, NET_ADMIN]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  opensips:
    image: ghcr.io/b0yz4kr14/tsisip/opensips:${TSISIP_IMAGE_TAG:?must be set}
    # VPS tuning: 640MB shm + 80MB pkg per child (container limit 1G)
    command: ["/usr/local/sbin/opensips", "-F", "-f", "/etc/opensips/opensips.cfg", "-m", "640", "-M", "80"]
    pull_policy: missing
    networks: [sip_edge, sip_internal, db_internal]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
    environment:
      OPENSIPS_LISTEN_IP: ${OPENSIPS_LISTEN_IP:-0.0.0.0}
      HOST_PUBLIC_IP: ${HOST_PUBLIC_IP:-127.0.0.1}
      RTPENGINE_HOST: rtpengine
      DB_HOST: postgres
      DB_NAME: opensips
      DB_USER: opensips
      OPENSIPS_HOST: 127.0.0.1
    secrets:
      - db_password
      - auth_secret
      - topology_secret
      - ca.crt
      - server.crt
      - server.key
      - crl.pem
      - trunk_cred_key
    volumes:
      - ./opensips/opensips.cfg.tpl:/etc/opensips/opensips.cfg.tpl:ro
      - tls_certs:/certs/live:rw
    depends_on:
      postgres:
        condition: service_healthy
      rtpengine:
        condition: service_started
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, SETUID, SETGID, DAC_OVERRIDE]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
      start_interval: 5s

  asterisk_pbx_1:
    image: ghcr.io/b0yz4kr14/tsisip/asterisk:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: missing
    networks: [sip_internal]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./docker/asterisk/pjsip.conf:/usr/local/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/usr/local/etc/asterisk/extensions.conf:ro
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    expose:
      - "5060/udp"
      - "5060/tcp"
      - "5038/tcp"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

  asterisk_pbx_2:
    image: ghcr.io/b0yz4kr14/tsisip/asterisk:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: missing
    networks: [sip_internal]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./docker/asterisk/pjsip.conf:/usr/local/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/extensions.conf:/usr/local/etc/asterisk/extensions.conf:ro
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    expose:
      - "5060/udp"
      - "5060/tcp"
      - "5038/tcp"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

  ocp:
    image: ghcr.io/b0yz4kr14/tsisip/ocp:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: missing
    networks: [sip_internal, db_internal, metrics_host]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # NOTE: Port 8084 requires Docker userland-proxy=true to bind on host.
    # When userland-proxy=false (VPS default for RTPengine performance),
    # access OCP via nginx proxy to the container's Docker bridge IP instead.
    ports:
      - "127.0.0.1:8084:80"
    environment:
      - DB_HOST=postgres
      - DB_NAME=opensips
      - DB_USER=opensips
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - OCP_AUDIT_RETENTION_DAYS=${OCP_AUDIT_RETENTION_DAYS:-90}
      - ADMIN_API_URL=http://admin_api:8080/index.php
    secrets:
      - db_password
      - trunk_cred_key
      - proxy_api_secret
    cap_drop: [ALL]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/login.php > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin_api:
    image: ghcr.io/b0yz4kr14/tsisip/admin_api:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: missing
    networks: [sip_internal, db_internal]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      - DB_HOST=postgres
      - DB_NAME=opensips
      - DB_USER=opensips
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - SUBSCRIBER_CREATE_RATE_LIMIT=${SUBSCRIBER_CREATE_RATE_LIMIT:-10}
      - SUBSCRIBER_UPDATE_RATE_LIMIT=${SUBSCRIBER_UPDATE_RATE_LIMIT:-30}
      - SUBSCRIBER_DELETE_RATE_LIMIT=${SUBSCRIBER_DELETE_RATE_LIMIT:-10}
    secrets:
      - db_password
      - proxy_api_secret
    cap_drop: [ALL]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/index.php > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  certbot:
    image: tsisip/certbot:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: if_not_present
    networks: [sip_internal]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    environment:
      TLS_DOMAIN: ${TLS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      ACME_SERVER: ${ACME_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      CERTBOT_STAGING: "${CERTBOT_STAGING:-0}"
      OPENSIPS_MI_URL: http://opensips:8888/mi
    volumes:
      - certbot_data:/etc/letsencrypt
      - tls_certs:/certs/live
    depends_on:
      opensips:
        condition: service_healthy
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    healthcheck:
      test: ["CMD-SHELL", "test -f /etc/letsencrypt/live/${TLS_DOMAIN}/fullchain.pem"]
      interval: 60s
      timeout: 5s
      retries: 1
      start_period: 30s

  certbot_exporter:
    image: ghcr.io/b0yz4kr14/tsisip/certbot_exporter:${TSISIP_IMAGE_TAG:?must be set}
    pull_policy: if_not_present
    networks: [sip_internal, metrics_host]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      CERT_PATH: /certs/live/server.crt
      STATE_DIR: /var/lib/certbot_exporter
      EXPORTER_PORT: 9101
      CERT_SOURCE: certbot
      TLS_DOMAIN: ${TLS_DOMAIN:-unknown}
    cap_drop: [ALL]
    volumes:
      - tls_certs:/certs/live:ro
    expose:
      - "9101"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9101/metrics | grep -q 'certbot'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backup:
    image: ghcr.io/b0yz4kr14/tsisip/backup:${TSISIP_IMAGE_TAG:?must be set}
    # For hotfix builds on the VPS, allow using a locally built image.
    # CI publishes versioned tags only; :latest is never used in production
    pull_policy: if_not_present
    networks: [db_internal, metrics_host]
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    # Note: With userland-proxy=false, loopback port mappings (127.0.0.1) do not
    # create working iptables rules. The backup metrics exporter is accessible
    # via Docker internal network (db_internal/metrics_host) at backup:9101.
    # Prometheus, when enabled, scrapes via internal network — not via host loopback.
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: opensips
      PGDATABASE: opensips
      PGPASSWORD_FILE: /run/secrets/db_password
      OCP_AUDIT_RETENTION_DAYS: ${OCP_AUDIT_RETENTION_DAYS:-90}
      BACKUP_DIR: /backup/daily
      WAL_DIR: /backup/wal
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_SCHEDULE: "0 2 * * *"
      ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      METRICS_ADDR: 0.0.0.0
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, CHOWN, DAC_OVERRIDE]
    secrets:
      - db_password
      - backup_encryption_key
      - rclone_s3_access_key
      - rclone_s3_secret_key
    volumes:
      - backup_data:/backup
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U opensips || test -f /backup/last_backup.timestamp"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  sip_edge:
    internal: false
  sip_internal:
    internal: true
  db_internal:
    internal: true
  metrics_host:
    internal: true

volumes:
  postgres_data:
  backup_data:
  tls_certs:
  certbot_data:

secrets:
  db_password:
    file: ./secrets/db_password
  auth_secret:
    file: ./secrets/auth_secret
  topology_secret:
    file: ./secrets/topology_secret
  backup_encryption_key:
    file: ./secrets/backup_encryption_key
  ca.crt:
    file: ./secrets/ca.crt
  server.crt:
    file: ./secrets/server.crt
  server.key:
    file: ./secrets/server.key
  crl.pem:
    file: ./secrets/crl.pem
  rclone_s3_access_key:
    file: ./secrets/rclone_s3_access_key
  rclone_s3_secret_key:
    file: ./secrets/rclone_s3_secret_key
  trunk_cred_key:
    file: ./secrets/trunk_cred_key
  proxy_api_secret:
    file: ./secrets/proxy_api_secret
